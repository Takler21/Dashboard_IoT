<div class="card h-100 border-0 shadow-sm">
  <div class="card-body p-4">
    @if (cargando()) {
      <app-spinner />
    } @else if (estadisticasGraficoCircular().datasets[0].data.length === 0) {
      <p class="text-muted text-center mb-0 py-5">No hay datos para mostrar.</p>
    } @else {
      <div class="chart-container">
        <canvas
          baseChart
          [data]="estadisticasGraficoCircular()"
          [type]="'pie'"
          [options]="opcionesGrafico()">
        </canvas>
      </div>
    }
  </div>
</div>
